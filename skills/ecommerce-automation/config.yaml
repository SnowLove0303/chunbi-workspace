# 1688 选品 + 拼多多运营自动化技能 - 配置文件

# ==================== 基础配置 ====================
basic:
  name: "1688 选品 + 拼多多运营自动化"
  version: "1.0.0"
  data_dir: "./data"
  logs_dir: "./logs"
  log_level: "DEBUG"

# ==================== 1688 配置 ====================
source_1688:
  mode: "hybrid"
  api:
    enabled: false
    app_key: ""
    app_secret: ""
  browser:
    type: "chromium"
    headless: false
    port: 9222
    user_data_dir: "./browser_data/1688"
  account:
    username: "13224612297"
    password: "Qq231276602"
    auto_login: false
  selection:
    min_profit_margin: 30
    min_sales: 50
    min_chengxintong_years: 2
    min_repeat_rate: 15
    batch_size: 20
    max_products: 100
    keywords:
      - "居家日用"
      - "收纳整理"
      - "厨房用品"
      - "创意礼品"
      - "办公文具"
      - "母婴用品"
      - "宠物用品"

# ==================== 拼多多配置 ====================
platform_pdd:
  mode: "browser"
  api:
    enabled: false
    client_id: ""
    client_secret: ""
    access_token: ""
  browser:
    type: "chromium"
    headless: false
    port: 9223
    user_data_dir: "./browser_data/pdd"
  shops:
    - shop_id: "shop_001"
      shop_name: "我的店铺"
      username: ""
      password: ""
      status: "active"
  listing:
    auto_optimize_title: true
    title_prefix: ""
    title_suffix: "包邮 正品 热销"
    default_freight_template_id: ""
    default_ship_from: "广东广州"
    stock_warning_threshold: 10
    pricing_strategy: "fixed"
    fixed_markup_rate: 0.5
    test_mode: true

# ==================== 订单处理配置 ====================
order_processing:
  check_interval: 300
  auto_confirm: false
  auto_purchase: false
  export_format: "excel"
  retention_days: 90

# ==================== 库存同步配置 ====================
inventory_sync:
  enabled: true
  sync_interval: 1800
  safety_stock: 5
  low_stock_alert: true
  low_stock_threshold: 20

# ==================== 数据报表配置 ====================
reports:
  daily_report: true
  daily_report_time: "23:00"
  notify_method: "dingtalk"
  dingtalk_webhook: ""
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    username: ""
    password: ""
    recipients: []

# ==================== 风控合规配置 ====================
compliance:
  forbidden_words_check: true
  advertising_law_check: true
  action_delay: 3
  max_daily_listings: 100
  max_retries: 3
  retry_delay: 60

# ==================== 定时任务配置 ====================
scheduler:
  enabled: true
  timezone: "Asia/Shanghai"
  tasks:
    - name: "1688 选品采集"
      cron: "0 9 * * *"
      enabled: true
    - name: "拼多多订单处理"
      interval: 300
      enabled: true
    - name: "库存同步"
      interval: 1800
      enabled: true
    - name: "生成日报"
      cron: "0 23 * * *"
      enabled: true
